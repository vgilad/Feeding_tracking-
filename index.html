<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e8637a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="עופרי">
<title>מעקב אכילה עופרי</title>

<!-- PWA manifest inline via JS (no server needed) -->
<script>
const manifestData = {
  name: "מעקב אכילה עופרי",
  short_name: "עופרי 🍼",
  description: "מעקב הנקה, שאיבה ומטרנה",
  start_url: ".",
  display: "standalone",
  background_color: "#fdf6f0",
  theme_color: "#e8637a",
  dir: "rtl",
  lang: "he",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%23e8637a'/%3E%3Ctext x='96' y='130' text-anchor='middle' font-size='100'%3E%F0%9F%8D%BC%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23e8637a'/%3E%3Ctext x='256' y='340' text-anchor='middle' font-size='280'%3E%F0%9F%8D%BC%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const manifestURL = URL.createObjectURL(blob);
document.write('<link rel="manifest" href="' + manifestURL + '">');
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:     #fdf6f0;
  --card:   #ffffff;
  --peach:  #f4a57a;
  --rose:   #e8637a;
  --mint:   #7bcfb8;
  --text:   #2d2020;
  --muted:  #9e8a82;
  --border: #eed9cc;
  --shadow: rgba(232,99,122,0.12);
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Heebo', sans-serif;
  color: var(--text);
  direction: rtl;
  -webkit-font-smoothing: antialiased;
}

/* safe area for notch phones */
body { padding-bottom: env(safe-area-inset-bottom); }

header {
  background: linear-gradient(135deg, #f9e0d4 0%, #fce8d8 50%, #e8f7f2 100%);
  padding: 22px 20px 14px;
  text-align: center;
  position: sticky; top: 0; z-index: 50;
  border-bottom: 2px solid var(--border);
}
.app-name { font-size: clamp(1.4rem,5.5vw,2.2rem); font-weight: 900; color: var(--rose); letter-spacing: -0.02em; }
.app-name span { color: var(--peach); }
.app-sub { font-size: .72rem; color: var(--muted); margin-top: 2px; }

/* install banner */
#install-banner {
  background: linear-gradient(135deg, #b09fd8, #8f7bbf);
  color: #fff;
  padding: 10px 16px;
  font-size: .78rem;
  font-weight: 600;
  text-align: center;
  gap: 10px;
  align-items: center;
  justify-content: center;
  display: none;
}
#install-banner.show { display: flex; }
#install-banner button {
  background: rgba(255,255,255,.25); border: 1px solid rgba(255,255,255,.5);
  color: #fff; font-family: 'Heebo',sans-serif; font-size: .72rem; font-weight: 700;
  padding: 5px 12px; border-radius: 20px; cursor: pointer;
}
#install-banner .close-banner {
  background: none; border: none; color: rgba(255,255,255,.7);
  font-size: 1rem; padding: 0 4px; cursor: pointer; margin-right: auto;
}

main { max-width: 700px; margin: 0 auto; padding: 18px 12px 160px; }

.session { display: none; animation: fadeIn .2s ease; }
.session.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

.session-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.session-title { font-size: 1rem; font-weight: 700; color: var(--rose); }
.session-time { font-size: .7rem; color: var(--muted); direction: ltr; }

.table-wrap {
  background: var(--card);
  border-radius: 16px;
  box-shadow: 0 4px 24px var(--shadow), 0 1px 4px rgba(0,0,0,.04);
  overflow: hidden;
  margin-bottom: 14px;
}

table { width: 100%; border-collapse: collapse; direction: rtl; }
thead tr { background: linear-gradient(90deg, var(--rose) 0%, var(--peach) 100%); }
thead th {
  padding: 12px 8px; font-size: .72rem; font-weight: 700; color: #fff;
  letter-spacing: .05em; text-align: center; white-space: nowrap;
}
thead th:first-child { text-align: right; padding-right: 14px; }

tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 7px 5px; text-align: center; vertical-align: middle; }
tbody td:first-child { text-align: right; padding-right: 12px; }

input[type="time"], input[type="number"] {
  font-family: 'Heebo', sans-serif; font-size: .85rem; font-weight: 500;
  color: var(--text); background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 6px 5px; width: 100%; text-align: center;
  outline: none; transition: border-color .18s, box-shadow .18s;
  -webkit-appearance: none; appearance: none;
}
input[type="time"]:focus, input[type="number"]:focus {
  border-color: var(--peach); box-shadow: 0 0 0 3px rgba(244,165,122,.18);
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
input[type="number"] { -moz-appearance: textfield; }

.col-time { width: 27%; } .col-nursing { width: 21%; }
.col-pump { width: 21%; } .col-formula { width: 21%; } .col-del { width: 10%; }

.del-btn {
  background: none; border: none; cursor: pointer; color: #ddc0b8;
  font-size: 1rem; padding: 4px 5px; border-radius: 6px;
  transition: color .15s, background .15s; line-height: 1;
}
.del-btn:active { color: var(--rose); background: #ffecea; }

tfoot tr { background: linear-gradient(135deg, #fff0eb 0%, #eef9f6 100%); }
tfoot td {
  padding: 10px 6px; font-size: .88rem; font-weight: 700;
  color: var(--rose); text-align: center; border-top: 2px solid var(--border);
}
tfoot td:first-child {
  text-align: right; padding-right: 14px;
  font-size: .74rem; font-weight: 600; color: var(--muted);
}
tfoot.hidden { display: none; }

.grand-total {
  display: none;
  background: linear-gradient(135deg, var(--rose) 0%, var(--peach) 100%);
  border-radius: 14px; padding: 14px 18px; margin-bottom: 14px;
  color: #fff; font-size: .85rem; font-weight: 500;
  box-shadow: 0 4px 16px rgba(232,99,122,.28);
}
.grand-total.visible { display: block; }
.grand-total strong { font-size: 1.4rem; font-weight: 900; display: block; margin-top: 3px; }

.empty-hint { text-align: center; padding: 24px 16px; color: var(--muted); font-size: .8rem; line-height: 2; }

.actions { display: flex; gap: 8px; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; }
.actions::-webkit-scrollbar { display: none; }
.action-btn {
  font-family: 'Heebo', sans-serif; font-size: .79rem; font-weight: 700;
  letter-spacing: .03em; padding: 12px 12px; border: none; border-radius: 12px;
  cursor: pointer; transition: transform .12s, filter .12s;
  flex: 0 0 auto; white-space: nowrap; -webkit-user-select: none;
}
.action-btn:active { transform: scale(.95); filter: brightness(.93); }
.btn-add   { background: linear-gradient(135deg, var(--mint) 0%, #5bbea6 100%); color: #fff; box-shadow: 0 3px 10px rgba(123,207,184,.4); }
.btn-sum   { background: linear-gradient(135deg, var(--rose) 0%, var(--peach) 100%); color: #fff; box-shadow: 0 3px 10px rgba(232,99,122,.35); }
.btn-new   { background: linear-gradient(135deg, #b09fd8 0%, #8f7bbf 100%); color: #fff; box-shadow: 0 3px 10px rgba(176,159,216,.4); }
.btn-clear { background: var(--card); color: var(--muted); border: 1.5px solid var(--border); flex: 0 0 auto; min-width: auto; padding: 12px 12px; }

/* ── BOTTOM NAV ── */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, rgba(253,246,240,0) 0%, var(--bg) 30%);
  padding: 10px 12px calc(14px + env(safe-area-inset-bottom)); z-index: 100;
}
.nav-inner {
  max-width: 700px; margin: 0 auto;
  display: flex; align-items: center; gap: 8px;
  overflow-x: auto; padding-bottom: 2px; scrollbar-width: none;
}
.nav-inner::-webkit-scrollbar { display: none; }
.nav-tab {
  flex-shrink: 0; width: 44px; height: 44px;
  border-radius: 11px; border: 2px solid var(--border);
  background: var(--card); color: var(--muted);
  font-family: 'Heebo', sans-serif; font-size: .88rem; font-weight: 700;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.07); -webkit-user-select: none;
}
.nav-tab:active { transform: scale(.91); }
.nav-tab.active {
  background: linear-gradient(135deg, var(--rose) 0%, var(--peach) 100%);
  border-color: transparent; color: #fff;
  box-shadow: 0 4px 14px rgba(232,99,122,.42);
  transform: translateY(-4px);
}

/* saved toast */
#saved-toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(45,32,32,.82); color: #fff; border-radius: 24px;
  padding: 8px 20px; font-size: .75rem; font-weight: 500;
  opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; z-index: 200;
  backdrop-filter: blur(6px); white-space: nowrap;
}
#saved-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 380px) {
  thead th { font-size: .63rem; padding: 10px 4px; }
  input[type="time"], input[type="number"] { font-size: .77rem; padding: 5px 3px; }
  .action-btn { font-size: .72rem; padding: 11px 9px; }
}
</style>
</head>
<body>

<header>
  <div class="app-name">מעקב אכילה <span>עופרי</span> 🍼</div>
  <div class="app-sub">רישום יומי · הנקה · שאיבה · מטרנה</div>
</header>

<div id="install-banner" class="show">
  <div id="install-auto" style="display:none;width:100%;align-items:center;justify-content:center;gap:10px">
    <span>התקיני כאפליקציה על המסך הבית 📱</span>
    <button id="install-btn">התקן</button>
    <button class="close-banner" id="close-banner">✕</button>
  </div>
  <div id="install-manual" style="display:flex;width:100%;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap">
    <span>📱 להתקנה: Chrome ← שלוש נקודות ← <strong>״הוסף למסך הבית״</strong></span>
    <button class="close-banner" id="close-banner-manual">✕</button>
  </div>
</div>

<main id="main-area"></main>

<div id="bottom-nav">
  <div class="nav-inner" id="nav-tabs"></div>
</div>

<div id="saved-toast">נשמר ✓</div>

<script>
'use strict';

// ══════════════════════════════════════════════
//  STORAGE  — saves everything to localStorage
// ══════════════════════════════════════════════
const STORE_KEY = 'ofri_feeding_v2';

function saveState() {
  const data = sessions.map(s => ({
    num:   s.num,
    label: s.label,
    rows:  getRowsData(s)
  }));
  localStorage.setItem(STORE_KEY, JSON.stringify({ sessions: data, activeIdx }));
  flashSaved();
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function getRowsData(session) {
  const rows = [];
  session.el.querySelectorAll('.s-tbody tr').forEach(tr => {
    const inp = tr.querySelectorAll('input');
    rows.push({
      time:    inp[0]?.value || '',
      nursing: inp[1]?.value || '',
      pump:    inp[2]?.value || '',
      formula: inp[3]?.value || ''
    });
  });
  return rows;
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 600);
}

let toastTimer = null;
function flashSaved() {
  const el = document.getElementById('saved-toast');
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1400);
}

// ══════════════════════════════════════════════
//  APP STATE
// ══════════════════════════════════════════════
let sessions    = [];
let activeIdx   = 0;
let globalRowId = 0;

function nowTime() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function nowLabel() {
  const d = new Date();
  return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'}) + '  ' +
         String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

// ══════════════════════════════════════════════
//  BUILD SESSION
// ══════════════════════════════════════════════
function createSession(labelOverride) {
  const num   = sessions.length + 1;
  const sid   = 'sess-' + num;
  const label = labelOverride || nowLabel();

  const div = document.createElement('div');
  div.className = 'session';
  div.id = sid;

  div.innerHTML =
    '<div class="session-header">' +
      '<div class="session-title">מדידה ' + num + '</div>' +
      '<div class="session-time">' + label + '</div>' +
    '</div>' +
    '<div class="table-wrap">' +
      '<table>' +
        '<thead><tr>' +
          '<th class="col-time">שעה</th>' +
          '<th class="col-nursing">הנקה<br><small style="font-weight:400;opacity:.85">דק\u05f3</small></th>' +
          '<th class="col-pump">מ\u05f4ל שאוב</th>' +
          '<th class="col-formula">מ\u05f4ל מטרנה</th>' +
          '<th class="col-del"></th>' +
        '</tr></thead>' +
        '<tbody class="s-tbody"></tbody>' +
        '<tfoot class="s-tfoot hidden"><tr>' +
          '<td>סכום</td>' +
          '<td class="s-sum-nursing">\u2014</td>' +
          '<td class="s-sum-pump">\u2014</td>' +
          '<td class="s-sum-formula">\u2014</td>' +
          '<td></td>' +
        '</tr></tfoot>' +
      '</table>' +
      '<div class="empty-hint s-empty">\u05dc\u05d7\u05e6\u05d9 \u05e2\u05dc \u05f4\u05d4\u05d5\u05e1\u05e3 \u05e9\u05d5\u05e8\u05d4\u05f4 \uD83C\uDF38</div>' +
    '</div>' +
    '<div class="grand-total s-grand">\u05e1\u05d4\u05f4\u05db \u05db\u05d5\u05dc\u05dc<strong class="s-grand-val">\u2014</strong></div>' +
    '<div class="actions">' +
      '<button class="action-btn btn-add"   data-action="add">+ \u05d4\u05d5\u05e1\u05e3 \u05e9\u05d5\u05e8\u05d4</button>' +
      '<button class="action-btn btn-sum"   data-action="sum">\u05e1\u05db\u05d5\u05dd \u2211</button>' +
      '<button class="action-btn btn-new"   data-action="new">\u05de\u05d3\u05d9\u05d3\u05d4 \u05d7\u05d3\u05e9\u05d4</button>' +
      '<button class="action-btn btn-clear" data-action="clear">\uD83D\uDDD1</button>' +
    '</div>';

  const idx = sessions.length;
  div.querySelector('[data-action=add]').addEventListener('click',   () => addRow(idx));
  div.querySelector('[data-action=sum]').addEventListener('click',   () => calcSum(idx));
  div.querySelector('[data-action=new]').addEventListener('click',   () => newSession());
  div.querySelector('[data-action=clear]').addEventListener('click', () => clearSession(idx));

  document.getElementById('main-area').appendChild(div);

  const tab = document.createElement('button');
  tab.className = 'nav-tab';
  tab.textContent = num;
  tab.addEventListener('click', () => switchTo(idx));
  document.getElementById('nav-tabs').appendChild(tab);

  const session = { num, sid, label, el: div, tab, rowCount: 0 };
  sessions.push(session);
  return session;
}

// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════
function switchTo(idx) {
  sessions.forEach(s => { s.el.classList.remove('active'); s.tab.classList.remove('active'); });
  sessions[idx].el.classList.add('active');
  sessions[idx].tab.classList.add('active');
  activeIdx = idx;
  sessions[idx].tab.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  window.scrollTo({ top:0, behavior:'smooth' });
}

// ══════════════════════════════════════════════
//  SESSION ACTIONS
// ══════════════════════════════════════════════
function newSession() {
  createSession();
  const newIdx = sessions.length - 1;
  switchTo(newIdx);
  addRow(newIdx);
  saveState();
}

function addRow(sIdx, data) {
  const session = sessions[sIdx];
  if (!session) return;
  globalRowId++;
  const rid = 'r-' + globalRowId;

  const tr = document.createElement('tr');
  tr.id = rid;
  const timeVal = data?.time || nowTime();
  tr.innerHTML =
    '<td class="col-time"><input type="time" value="' + timeVal + '"></td>' +
    '<td class="col-nursing"><input type="number" min="0" max="999" placeholder="\u2014" value="' + (data?.nursing||'') + '"></td>' +
    '<td class="col-pump"><input type="number" min="0" max="999" placeholder="\u2014" value="' + (data?.pump||'') + '"></td>' +
    '<td class="col-formula"><input type="number" min="0" max="999" placeholder="\u2014" value="' + (data?.formula||'') + '"></td>' +
    '<td class="col-del"><button class="del-btn" data-rid="' + rid + '" data-sidx="' + sIdx + '">\u2715</button></td>';

  tr.querySelector('.del-btn').addEventListener('click', function() {
    deleteRow(this.dataset.rid, parseInt(this.dataset.sidx));
  });

  // Save on any input change
  tr.querySelectorAll('input').forEach(inp => inp.addEventListener('input', scheduleSave));

  session.el.querySelector('.s-tbody').appendChild(tr);
  session.rowCount++;
  syncEmpty(sIdx);
  hideTotals(sIdx);
  if (!data) tr.querySelector('input[type=time]').focus();
}

function deleteRow(rid, sIdx) {
  const tr = document.getElementById(rid);
  if (!tr) return;
  tr.style.transition = 'opacity .18s, transform .18s';
  tr.style.opacity = '0';
  tr.style.transform = 'translateX(16px)';
  setTimeout(() => {
    tr.remove();
    sessions[sIdx].rowCount--;
    syncEmpty(sIdx);
    hideTotals(sIdx);
    saveState();
  }, 180);
}

function clearSession(sIdx) {
  if (!confirm('\u05dc\u05de\u05d7\u05d5\u05e7 \u05d0\u05ea \u05db\u05dc \u05d4\u05e0\u05ea\u05d5\u05e0\u05d9\u05dd \u05e9\u05dc \u05de\u05d3\u05d9\u05d3\u05d4 ' + (sIdx+1) + '?')) return;
  sessions[sIdx].el.querySelector('.s-tbody').innerHTML = '';
  sessions[sIdx].rowCount = 0;
  hideTotals(sIdx);
  syncEmpty(sIdx);
  saveState();
}

function syncEmpty(sIdx) {
  const s = sessions[sIdx];
  const rows = s.el.querySelectorAll('.s-tbody tr');
  s.el.querySelector('.s-empty').style.display = rows.length ? 'none' : 'block';
}

function hideTotals(sIdx) {
  const s = sessions[sIdx];
  s.el.querySelector('.s-tfoot').classList.add('hidden');
  s.el.querySelector('.s-grand').classList.remove('visible');
}

// ══════════════════════════════════════════════
//  CALC SUM
// ══════════════════════════════════════════════
function calcSum(sIdx) {
  const s = sessions[sIdx];
  const rows = s.el.querySelectorAll('.s-tbody tr');
  if (!rows.length) return;

  function colSum(ci) {
    let total = 0, has = false;
    rows.forEach(tr => {
      const inp = tr.querySelectorAll('input')[ci];
      const v = parseFloat(inp ? inp.value : '');
      if (!isNaN(v) && v > 0) { total += v; has = true; }
    });
    return { total, has };
  }

  const nursing = colSum(1), pump = colSum(2), formula = colSum(3);

  s.el.querySelector('.s-sum-nursing').textContent = nursing.has ? nursing.total + ' \u05d3\u05e7\u05f3' : '\u2014';
  s.el.querySelector('.s-sum-pump').textContent    = pump.has    ? pump.total    + ' \u05de\u05f4\u05dc' : '\u2014';
  s.el.querySelector('.s-sum-formula').textContent = formula.has ? formula.total + ' \u05de\u05f4\u05dc' : '\u2014';
  s.el.querySelector('.s-tfoot').classList.remove('hidden');

  const mlTotal = (pump.has ? pump.total : 0) + (formula.has ? formula.total : 0);
  const grandEl  = s.el.querySelector('.s-grand');
  const grandVal = s.el.querySelector('.s-grand-val');
  const parts = [];
  if (mlTotal > 0) parts.push(mlTotal + ' \u05de\u05f4\u05dc \u05e1\u05d4\u05f4\u05db');
  if (nursing.has) parts.push(nursing.total + ' \u05d3\u05e7\u05f3 \u05d4\u05e0\u05e7\u05d4');

  if (parts.length) {
    grandEl.classList.add('visible');
    grandVal.textContent = parts.join(' \u00b7 ');
  } else {
    grandEl.classList.remove('visible');
  }
  s.el.querySelector('.s-tfoot').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ══════════════════════════════════════════════
//  INIT — restore from localStorage or fresh
// ══════════════════════════════════════════════
function init() {
  const saved = loadState();
  if (saved && saved.sessions && saved.sessions.length) {
    saved.sessions.forEach(sData => {
      createSession(sData.label);
      const sIdx = sessions.length - 1;
      (sData.rows || []).forEach(row => addRow(sIdx, row));
      syncEmpty(sIdx);
    });
    const restoreIdx = Math.min(saved.activeIdx || 0, sessions.length - 1);
    switchTo(restoreIdx);
  } else {
    createSession();
    switchTo(0);
    addRow(0);
  }
}

// ══════════════════════════════════════════════
//  PWA INSTALL
// ══════════════════════════════════════════════
let deferredInstallPrompt = null;

// Show install banner always (manual instructions shown by default)
// If running as installed PWA, hide banner entirely
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
if (!isStandalone) {
  document.getElementById('install-banner').classList.add('show');
}

// If browser supports beforeinstallprompt, show the one-tap install button instead
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Switch to auto-install UI
  document.getElementById('install-manual').style.display = 'none';
  document.getElementById('install-auto').style.display   = 'flex';
  document.getElementById('install-banner').classList.add('show');
});

const installBtn = document.getElementById('install-btn');
if (installBtn) {
  installBtn.addEventListener('click', async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const result = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    document.getElementById('install-banner').classList.remove('show');
  });
}

document.getElementById('close-banner').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('show');
});
document.getElementById('close-banner-manual').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('show');
});

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.remove('show');
  deferredInstallPrompt = null;
});

// ══════════════════════════════════════════════
//  SERVICE WORKER (inline, enables offline + caching)
// ══════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'ofri-v1';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  // For navigation requests, serve from cache if available
  if (e.request.mode === 'navigate') {
    e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
        const clone = resp.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return resp;
      }).catch(() => caches.match('/')))
    );
    return;
  }
  // For other requests, network first with cache fallback
  e.respondWith(
    fetch(e.request).then(resp => {
      if (resp.ok) {
        const clone = resp.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return resp;
    }).catch(() => caches.match(e.request))
  );
});
`;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swURL  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL, { scope: './' }).catch(() => {});
}

// ══════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════
init();
</script>
